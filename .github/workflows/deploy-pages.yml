# APP: build the static app and deploy to GitHub Pages. $0. APP owns its deploy (APP-DEPLOY-001).
# SKELETON — build steps land with the APP segment.
name: Deploy app to GitHub Pages

on:
  push:
    branches: [main]      # ← change if your default branch is "master"
  schedule:
    - cron: "0 7 * * 1"   # weekly, Mondays 07:00 UTC — picks up the ETL's fresh metros.json commit
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w @tb-ntb/app
      - uses: actions/upload-pages-artifact@v5
        with:
          path: packages/app/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

# PIPE: scheduled ETL — PIPE owns its execution. Gathers data and publishes metros.json for $0 on
# GitHub-hosted runners on a cron. Run step is wired (python -m pipeline); publish is PIPE-PROC-012.
name: etl

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Mondays 06:00 UTC — cadence is an INFRA/PIPE decision
  workflow_dispatch: {}   # allow manual runs

permissions:
  contents: write         # if publishing by committing metros.json back to the repo

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r pipeline/requirements.txt
      - name: Run ETL
        run: python -m pipeline --out metros.json # emits & schema-validates metros.json (contract v5)
      - name: Publish (commit-back — PIPE-PROC-012)
        run: |
          git add metros.json
          if git diff --cached --quiet; then
            echo "metros.json unchanged — nothing to publish"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: refresh metros.json [skip ci]"
          git push
